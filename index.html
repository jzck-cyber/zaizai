<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>崽崽 | 个人主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f8faff, #f0f2f8);
            color: #1e2a3e;
            padding: 2rem 1rem;
        }
        .container{ max-width: 1100px; margin: 0 auto; }
        .card{
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .profile{ text-align: center; }
        .avatar{
            width: 128px; height: 128px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(79,125,243,0.3);
        }
        .avatar img{ width: 100%; height: 100%; object-fit: cover; }
        h1{
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1e2a3e, #2d3a4e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline{ font-size: 1.2rem; color: #4b5a6e; margin: 0.5rem 0 1rem; }
        .bio{ max-width: 600px; margin: 1rem auto 0; color: #334155; }
        .section-title{
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid #4f7df3;
            display: inline-block;
        }
        .songs-grid{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .song-card{
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            transition: transform 0.2s;
            border: 1px solid #e9eef3;
        }
        .song-card:hover{ transform: translateY(-4px); }
        .song-name{ font-size: 1.2rem; font-weight: 700; margin-bottom: 0.3rem; }
        .song-remark{ font-size: 0.85rem; color: #6c7a91; }
        .social-links{
            display: flex; justify-content: center; flex-wrap: wrap; gap: 1.2rem;
            margin-top: 1rem;
        }
        .social-btn{
            background: white; padding: 0.7rem 1.5rem; border-radius: 60px;
            text-decoration: none; font-weight: 500; color: #1e2a3e;
            display: inline-flex; align-items: center; gap: 8px;
            border: 1px solid #cfddee;
        }
        .social-btn:hover{ background: #4f7df3; color: white; border-color: #4f7df3; }
        .contact-email{ text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
        .extra-note{ text-align: center; font-size: 0.8rem; color: #6c7a91; margin-top: 1rem; }
        footer{ text-align: center; padding: 1.5rem 0; font-size: 0.8rem; color: #6c7a91; }
        @media (max-width: 640px){
            .card{ padding: 1.5rem; }
            h1{ font-size: 1.8rem; }
            .section-title{ font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 个人信息 -->
    <div class="card profile">
        <div class="avatar">
            <img src="85b60b5b64cd098d71ce406b65926f4.jpg" alt="崽崽的头像">
        </div>
        <h1>崽崽</h1>
        <div class="tagline">✨ 全职杂谈主播 ✨</div>
        <div class="bio">热爱直播热情活泼的可爱崽崽</div>
    </div>

    <!-- 歌单展示区（从JSONBin读取） -->
    <div class="card">
        <div class="section-title">🎶 崽崽的曲库</div>
        <div id="songsGrid" class="songs-grid">
            <div style="text-align:center; padding:2rem;">加载中...</div>
        </div>
    </div>
    <!-- 精选作品：信箱入口 -->
    <div class="card">
        <div class="section-title">📬 树洞信箱</div>
        <div class="projects-grid" style="grid-template-columns: 1fr;">
            <a href="mailbox.html" class="project-card" style="text-decoration: none;">
                <div class="project-title">📬 崽崽的信箱</div>
                <div class="project-desc">一个匿名倾诉与心灵树洞。你可以写信分享故事、问题或悄悄话，所有人可以匿名评论。</div>
                <span class="project-tag">匿名信箱</span>
                <span class="project-tag">树洞</span>
            </a>
        </div>
    </div>
    <!-- 保持联系 -->
    <div class="card">
        <div class="section-title">保持联系</div>
        <div class="social-links">
            <a href="#" class="social-btn">🐧 QQ群</a>
            <a href="#" class="social-btn">💬 微信群</a>
            <a href="#" class="social-btn">🎬 B站直播间</a>
        </div>
        <div class="contact-email">📧 邮件联系: <strong>zaizai@example.com</strong></div>
        <div class="extra-note">
            🔔 QQ群号：367640115<br>
            📱 微信群：上舰或粉丝牌20级，注意后台私信<br>
            📺 B站直播间：<a href="#" style="color:#4f7df3;">https://live.bilibili.com/1986460419</a>
        </div>
        <hr />
        <div style="text-align:center; font-size:0.85rem;">💡 欢迎每一位喜欢崽崽的来群里玩呐</div>
    </div>
    <footer>© 2026 崽崽 · 保持好奇，持续努力</footer>
</div>

<script>
    // 你的 JSONBin ID（公开读取）
    const BIN_ID = "6a2cf550f5f4af5e29ea8566";
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

    async function loadSongs() {
        const container = document.getElementById('songsGrid');
        try {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            let playlist = data.record || [];
            if (!playlist.length) {
                container.innerHTML = '<div style="text-align:center; padding:2rem;">🎵 暂无歌曲，崽崽正在努力加载中～</div>';
                return;
            }
            let html = '';
            playlist.forEach(song => {
                html += `
                    <div class="song-card">
                        <div class="song-name">🎤 ${escapeHtml(song.name)}</div>
                        <div class="song-remark">${escapeHtml(song.remark) || '✨ 暂无备注'}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div style="text-align:center; padding:2rem;">⚠️ 加载失败，请稍后重试</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    loadSongs();
    // 每30秒自动刷新歌单
    setInterval(loadSongs, 30000);
</script>
</body>
</html>
