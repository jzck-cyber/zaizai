<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌单管理｜崽崽</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:linear-gradient(145deg,#f8faff,#f0f2f8);padding:2rem 1rem;color:#1e2a3e;}
        .container{max-width:900px;margin:0 auto;}
        .card{background:rgba(255,255,255,0.85);backdrop-filter:blur(2px);border-radius:2rem;padding:2rem;margin-bottom:2rem;box-shadow:0 20px 35px -12px rgba(0,0,0,0.1);}
        h1{font-size:2rem;margin-bottom:0.5rem;}
        .sub{color:#4b5a6e;margin-bottom:1.5rem;border-left:3px solid #4f7df3;padding-left:1rem;}
        .form-group{margin-bottom:1.2rem;}
        label{display:block;font-weight:500;margin-bottom:0.4rem;}
        input{width:100%;padding:0.8rem 1rem;border:1px solid #cfddee;border-radius:1.5rem;}
        button{background:#4f7df3;color:white;border:none;padding:0.7rem 1.5rem;border-radius:2rem;cursor:pointer;}
        .btn-secondary{background:#cdd9f4;color:#1e2a3e;}
        .song-item{background:white;border-radius:1.2rem;padding:1rem;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
        .song-name{font-weight:700;}
        .edit-btn,.delete-btn{background:none;border:none;padding:0.3rem 1rem;border-radius:2rem;cursor:pointer;}
        .edit-btn{background:#eef2ff;color:#4f7df3;}
        .delete-btn{background:#fee2e2;color:#e5484d;}
        .back-link{display:inline-block;margin-top:1rem;color:#4f7df3;text-decoration:none;}
        .empty-msg{text-align:center;padding:2rem;color:#6c7a91;}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🎤 崽崽的歌单管理</h1>
        <div class="sub">只有你能看到这个页面～ 增、删、改歌曲（云端同步）</div>
        <div class="form-group"><label>歌曲名称 *</label><input type="text" id="songName" placeholder="例：失眠飞行"></div>
        <div class="form-group"><label>备注 / 原唱</label><input type="text" id="songRemark" placeholder="例：原唱：接个吻，开一枪"></div>
        <div><button id="addBtn">➕ 添加歌曲</button> <button id="cancelEditBtn" class="btn-secondary" style="display:none;">取消编辑</button></div>
    </div>
    <div class="card">
        <h2>📋 当前曲库</h2>
        <div id="songListContainer"></div>
        <a href="index.html" class="back-link">← 返回主页</a>
    </div>
</div>
<script>
    // ========== 请修改为你的实际信息 ==========
    const BIN_ID = "6a2cf550f5f4af5e29ea8566 ";        // 替换为你的 Bin ID，例如 "6a2cf550f5f4af5e29ea8566"
    const API_KEY = "$2a$10$e2f5uGDXTK37nFCRT2PyeO6Ws7MuWT3w.XPjZ6LqEHWuRFHy/hE66";      // 替换为你的 API Key，以 $2a$ 开头
    // =====================================
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    let playlist = [];
    let editIndex = null;

    async function loadFromCloud() {
        try {
            const res = await fetch(API_URL, { headers: { "X-Master-Key": API_KEY } });
            const data = await res.json();
            playlist = data.record;
            if (!Array.isArray(playlist)) playlist = [];
            saveToLocal();
            render();
        } catch (err) {
            console.error("加载失败", err);
            const local = localStorage.getItem('zaizai_songlist');
            if (local) playlist = JSON.parse(local);
            else playlist = [];
            render();
        }
    }

    async function saveToCloud() {
        try {
            await fetch(API_URL, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(playlist)
            });
            saveToLocal();
        } catch (err) {
            console.error("保存失败", err);
            alert("网络错误，数据未同步到云端，请稍后重试");
        }
    }

    function saveToLocal() { localStorage.setItem('zaizai_songlist', JSON.stringify(playlist)); }

    function render() {
        const container = document.getElementById('songListContainer');
        if (!container) return;
        if (playlist.length === 0) {
            container.innerHTML = '<div class="empty-msg">✨ 暂无歌曲，添加一首吧～</div>';
            return;
        }
        let html = '';
        playlist.forEach((song, idx) => {
            html += `
                <div class="song-item">
                    <div class="song-info">
                        <div class="song-name">🎵 ${escapeHtml(song.name)}</div>
                        <div class="song-remark">${escapeHtml(song.remark) || '无备注'}</div>
                    </div>
                    <div class="actions">
                        <button class="edit-btn" data-index="${idx}">✏️ 编辑</button>
                        <button class="delete-btn" data-index="${idx}">🗑️ 删除</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => editSong(parseInt(btn.dataset.index)));
        });
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const idx = parseInt(btn.dataset.index);
                if (confirm(`删除《${playlist[idx].name}》？`)) {
                    playlist.splice(idx, 1);
                    await saveToCloud();
                    render();
                    if (editIndex !== null) cancelEdit();
                }
            });
        });
    }

    function editSong(index) {
        const song = playlist[index];
        document.getElementById('songName').value = song.name;
        document.getElementById('songRemark').value = song.remark || '';
        editIndex = index;
        document.getElementById('addBtn').textContent = '✏️ 保存修改';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
    }

    function cancelEdit() {
        document.getElementById('songName').value = '';
        document.getElementById('songRemark').value = '';
        editIndex = null;
        document.getElementById('addBtn').textContent = '➕ 添加歌曲';
        document.getElementById('cancelEditBtn').style.display = 'none';
    }

    async function saveSong(name, remark) {
        if (!name.trim()) { alert("请填写歌名"); return false; }
        if (editIndex !== null) {
            playlist[editIndex] = { name: name.trim(), remark: remark.trim() };
            editIndex = null;
            cancelEdit();
        } else {
            playlist.push({ name: name.trim(), remark: remark.trim() });
        }
        await saveToCloud();
        render();
        return true;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
        const name = document.getElementById('songName').value;
        const remark = document.getElementById('songRemark').value;
        await saveSong(name, remark);
        if (editIndex === null) {
            document.getElementById('songName').value = '';
            document.getElementById('songRemark').value = '';
        }
    });
    document.getElementById('cancelEditBtn').addEventListener('click', cancelEdit);

    loadFromCloud();
</script>
</body>
</html>
