<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞信箱｜崽崽</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family: system-ui;background: linear-gradient(145deg, #f9f0f4, #ffe6ef);padding: 2rem 1rem;color:#2c1e2a;}
        .container{max-width:800px;margin:0 auto;}
        .card{background:rgba(255,255,255,0.9);backdrop-filter:blur(2px);border-radius:2rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 15px 30px -12px rgba(0,0,0,0.1);border:1px solid #ffecf2;}
        h1{font-size:2rem;background:linear-gradient(135deg,#d96c8c,#b84c6c);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:0.5rem;}
        .sub{color:#9e7a8a;margin-bottom:1.5rem;}
        textarea{width:100%;padding:0.8rem;border-radius:1.5rem;border:1px solid #f5cfdf;font-family:inherit;resize:vertical;}
        button{background:#e8a0bb;color:white;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;margin-top:0.5rem;}
        button:hover{background:#d47a9e;}
        .letter{background:white;border-radius:1.2rem;padding:1rem;margin-bottom:1.2rem;}
        .letter-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:0.5rem;font-size:0.75rem;color:#b28aa0;}
        .letter-content{font-size:0.95rem;margin:0.5rem 0;white-space:pre-wrap;word-break:break-word;}
        .delete-btn{background:#fee2e2;color:#e5484d;border:none;padding:0.2rem 0.6rem;border-radius:1rem;cursor:pointer;font-size:0.7rem;}
        .comments-section{margin-top:0.8rem;padding-left:1rem;border-left:2px solid #ffe6ef;}
        .comment{font-size:0.85rem;background:#fff5f9;padding:0.4rem 0.6rem;border-radius:1rem;margin-bottom:0.4rem;word-break:break-word;}
        .comment-meta{font-size:0.65rem;color:#c28aa0;margin-bottom:0.2rem;}
        .add-comment{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
        .add-comment input{flex:1;padding:0.4rem 0.8rem;border-radius:2rem;border:1px solid #f5cfdf;}
        .admin-panel{text-align:right;margin-bottom:1rem;}
        .admin-btn{background:#cdb5c2;font-size:0.7rem;padding:0.2rem 0.8rem;}
        .status-bar{background:#f5f0f2;padding:0.3rem 0.8rem;border-radius:2rem;font-size:0.7rem;display:inline-block;margin-bottom:1rem;}
        footer{text-align:center;margin-top:2rem;font-size:0.7rem;color:#b28aa0;}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📬 崽崽的树洞信箱</h1>
        <div class="sub">匿名倾诉，温暖回响</div>
        <div id="loginStatus" class="status-bar">⏳ 正在连接... 请稍等</div>
        <div class="admin-panel" id="adminPanel" style="display: none;">
            <button id="adminModeBtn" class="admin-btn">🔓 管理员模式已开启</button>
        </div>
        <textarea id="newLetter" rows="3" placeholder="写下你想说的话...（匿名）"></textarea>
        <button id="postLetterBtn">📨 发布信件</button>
    </div>
    <div id="lettersContainer"></div>
    <footer>✨ 所有内容匿名，请友善发言 ✨</footer>
</div>

<script>
    // ========== 你的 Firebase 配置 ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDW-Ix5Foerv-5A8M2-u1wabvb9Fai0wqU",
        authDomain: "xinxiang1-2e2a7.firebaseapp.com",
        databaseURL: "https://xinxiang1-2e2a7-default-rtdb.firebaseio.com",
        projectId: "xinxiang1-2e2a7",
        storageBucket: "xinxiang1-2e2a7.firebasestorage.app",
        messagingSenderId: "56801188595",
        appId: "1:56801188595:web:d8f83456808ef22b647586",
        measurementId: "G-P8L8J2HEK5"
    };
    // =====================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let isAdmin = false;
    const adminPassword = "zaizai2026";

    const statusDiv = document.getElementById('loginStatus');

    auth.signInAnonymously()
        .then(() => {
            statusDiv.innerHTML = '✅ 已匿名登录，可以发布信件和评论';
            statusDiv.style.backgroundColor = '#e6f7e6';
        })
        .catch(err => {
            console.error("登录失败", err);
            statusDiv.innerHTML = '❌ 连接失败：' + err.message + ' <button id="retryLoginBtn" style="background:#e8a0bb; padding:0.1rem 0.5rem; margin-left:0.5rem;">重试</button>';
            statusDiv.style.backgroundColor = '#fee2e2';
            document.getElementById('retryLoginBtn')?.addEventListener('click', () => location.reload());
        });

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            console.log("登录成功 uid:", user.uid);
            database.ref(`admins/${user.uid}`).once('value').then(snap => {
                isAdmin = snap.exists();
                if (isAdmin) {
                    document.getElementById('adminPanel').style.display = 'block';
                } else {
                    const adminPanel = document.getElementById('adminPanel');
                    adminPanel.style.display = 'block';
                    adminPanel.innerHTML = `<button id="becomeAdminBtn" class="admin-btn">🔑 成为管理员</button>`;
                    document.getElementById('becomeAdminBtn')?.addEventListener('click', () => {
                        const pwd = prompt("请输入管理员密码");
                        if (pwd === adminPassword) {
                            database.ref(`admins/${user.uid}`).set(true).then(() => {
                                alert("你已成为管理员，刷新页面后即可看到删除按钮");
                                location.reload();
                            });
                        } else alert("密码错误");
                    });
                }
            });
        } else {
            statusDiv.innerHTML = '⚠️ 未登录，请刷新页面重试';
        }
    });

    // 发布信件
    document.getElementById('postLetterBtn').addEventListener('click', async () => {
        const content = document.getElementById('newLetter').value.trim();
        if (!content) return alert("请填写内容");
        if (!currentUser) {
            alert("尚未登录，请稍等几秒或刷新页面后再试");
            return;
        }
        const newLetterRef = database.ref('letters').push();
        await newLetterRef.set({
            content: content,
            userId: currentUser.uid,
            timestamp: Date.now()
        });
        document.getElementById('newLetter').value = '';
    });

    // 添加评论
    async function addComment(letterId, commentText) {
        if (!commentText.trim()) return;
        if (!currentUser) {
            alert("尚未登录，请稍后重试");
            return;
        }
        const commentRef = database.ref(`letters/${letterId}/comments`).push();
        await commentRef.set({
            content: commentText,
            userId: currentUser.uid,
            timestamp: Date.now()
        });
    }

    // ✅ 修正后的删除函数：管理员或作者可删除，且只有一次确认
    async function deleteLetter(letterId, letterUserId) {
        // 权限判断：管理员 或 信件作者
        if (!isAdmin && letterUserId !== currentUser?.uid) {
            alert("你没有权限删除此信件");
            return;
        }
        if (confirm("确定删除这封信件吗？")) {
            await database.ref(`letters/${letterId}`).remove();
        }
    }

    // 实时渲染信件列表
    const lettersRef = database.ref('letters');
    lettersRef.on('value', (snapshot) => {
        const letters = snapshot.val();
        const container = document.getElementById('lettersContainer');
        if (!letters) {
            container.innerHTML = '<div class="card" style="text-align:center;">✨ 还没有信件，来当第一个树洞吧 ✨</div>';
            return;
        }
        const lettersArray = Object.entries(letters).map(([id, data]) => ({ id, ...data }));
        lettersArray.sort((a,b) => b.timestamp - a.timestamp);
        let html = '';
        for (let letter of lettersArray) {
            const date = new Date(letter.timestamp).toLocaleString();
            const comments = letter.comments ? Object.entries(letter.comments).map(([cid, cmt]) => ({ id: cid, ...cmt })).sort((a,b)=>a.timestamp - b.timestamp) : [];
            let commentsHtml = '';
            comments.forEach(cmt => {
                const cmtDate = new Date(cmt.timestamp).toLocaleString();
                commentsHtml += `
                    <div class="comment">
                        <div class="comment-meta">匿名 · ${cmtDate}</div>
                        <div>${escapeHtml(cmt.content)}</div>
                    </div>
                `;
            });
            // 删除按钮显示条件：管理员 或 信件作者
            const showDelete = (isAdmin || letter.userId === currentUser?.uid) 
                ? `<button class="delete-btn" data-id="${letter.id}" data-userid="${letter.userId}">🗑️ 删除</button>` 
                : '';
            html += `
                <div class="letter" data-id="${letter.id}">
                    <div class="letter-header">
                        <span>📝 匿名 · ${date}</span>
                        ${showDelete}
                    </div>
                    <div class="letter-content">${escapeHtml(letter.content)}</div>
                    <div class="comments-section">
                        ${commentsHtml}
                        <div class="add-comment">
                            <input type="text" placeholder="写一条评论..." id="commentInput_${letter.id}">
                            <button class="comment-submit" data-id="${letter.id}">💬 评论</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // 绑定删除按钮事件（传递作者ID）
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letterId = btn.getAttribute('data-id');
                const letterUserId = btn.getAttribute('data-userid');
                deleteLetter(letterId, letterUserId);
            });
        });
        // 绑定评论提交事件
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letterId = btn.getAttribute('data-id');
                const input = document.getElementById(`commentInput_${letterId}`);
                const text = input.value.trim();
                if (text) {
                    addComment(letterId, text);
                    input.value = '';
                } else alert("评论不能为空");
            });
        });
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
</script>
</body>
</html>
