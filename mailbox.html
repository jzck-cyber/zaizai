<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>树洞信箱｜崽崽</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* 样式保持不变，与之前相同 */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family: system-ui;background: linear-gradient(145deg, #f9f0f4, #ffe6ef);padding: 2rem 1rem;color:#2c1e2a;}
        .container{max-width:800px;margin:0 auto;}
        .card{background:rgba(255,255,255,0.9);backdrop-filter:blur(2px);border-radius:2rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 15px 30px -12px rgba(0,0,0,0.1);border:1px solid #ffecf2;}
        h1{font-size:2rem;background:linear-gradient(135deg,#d96c8c,#b84c6c);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:0.5rem;}
        .sub{color:#9e7a8a;margin-bottom:1.5rem;}
        textarea{width:100%;padding:0.8rem;border-radius:1.5rem;border:1px solid #f5cfdf;font-family:inherit;resize:vertical;}
        button{background:#e8a0bb;color:white;border:none;padding:0.6rem 1.2rem;border-radius:2rem;cursor:pointer;margin-top:0.5rem;}
        button:hover{background:#d47a9e;}
        .letter{background:white;border-radius:1.2rem;padding:1rem;margin-bottom:1.2rem;}
        .letter-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:0.5rem;font-size:0.75rem;color:#b28aa0;}
        .letter-content{font-size:0.95rem;margin:0.5rem 0;white-space:pre-wrap;word-break:break-word;}
        .delete-btn{background:#fee2e2;color:#e5484d;border:none;padding:0.2rem 0.6rem;border-radius:1rem;cursor:pointer;font-size:0.7rem;}
        .comments-section{margin-top:0.8rem;padding-left:1rem;border-left:2px solid #ffe6ef;}
        .comment{font-size:0.85rem;background:#fff5f9;padding:0.4rem 0.6rem;border-radius:1rem;margin-bottom:0.4rem;word-break:break-word;}
        .comment-meta{font-size:0.65rem;color:#c28aa0;margin-bottom:0.2rem;}
        .add-comment{display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;}
        .add-comment input{flex:1;padding:0.4rem 0.8rem;border-radius:2rem;border:1px solid #f5cfdf;}
        .admin-panel{text-align:right;margin-bottom:1rem;}
        .admin-btn{background:#cdb5c2;font-size:0.7rem;padding:0.2rem 0.8rem;}
        .status-bar{background:#f5f0f2;padding:0.3rem 0.8rem;border-radius:2rem;font-size:0.7rem;display:inline-block;margin-bottom:1rem;}
        .browser-tip{background:#fff0f5;border-radius:1rem;padding:0.5rem;margin-bottom:1rem;text-align:center;font-size:0.8rem;}
        footer{text-align:center;margin-top:2rem;font-size:0.7rem;color:#b28aa0;}
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background:white; border-radius:2rem; padding:2rem; max-width:500px; width:90%; box-shadow:0 20px 35px -12px rgba(0,0,0,0.3); position:relative; }
        .modal-box h2 { margin-bottom:1rem; color:#d96c8c; }
        .modal-box textarea { min-height:120px; }
        .modal-close { position:absolute; top:0.5rem; right:1rem; font-size:1.5rem; cursor:pointer; color:#b28aa0; background:none; border:none; }
        .private-letter-item { background:#fdf5f8; border-radius:1rem; padding:0.8rem; margin-bottom:0.8rem; border-left:3px solid #d96c8c; }
        .private-letter-meta { font-size:0.7rem; color:#b28aa0; margin-bottom:0.3rem; }
        .private-letter-content { font-size:0.9rem; word-break:break-word; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📬 崽崽的树洞信箱</h1>
        <div class="sub">匿名倾诉，温暖回响 | 管理员每次进入需验证</div>
        <div class="browser-tip">📱 推荐使用 Chrome 或 Safari 浏览器</div>
        <div id="statusBar" class="status-bar">⏳ 初始化中...</div>
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <button id="adminModeBtn" class="admin-btn">🔓 管理员模式已开启</button>
        </div>
        <div style="text-align: right; margin-bottom: 1rem;">
            <button id="openPrivateLetterBtn" style="background: #b84c6c; padding: 0.4rem 1.2rem;">✉️ 写给崽崽的信</button>
        </div>
        <textarea id="newLetter" rows="3" placeholder="写下你想说的话...（匿名，公开可见）"></textarea>
        <button id="postLetterBtn">📨 发布信件</button>
    </div>
    <div id="lettersContainer"></div>
    <div id="privateLettersContainer" style="display: none;"></div>
    <footer>✨ 所有内容匿名，请友善发言 | 管理员需每次验证 ✨</footer>
</div>

<!-- 私信模态框 -->
<div class="modal-overlay" id="privateLetterModal">
    <div class="modal-box">
        <button class="modal-close" id="closePrivateModal">&times;</button>
        <h2>✉️ 写给崽崽的信</h2>
        <p style="color: #9e7a8a; font-size: 0.8rem; margin-bottom: 1rem;">崽崽会认真阅读每一封来信，但不会公开。所有内容只有崽崽能看到。</p>
        <textarea id="privateLetterContent" rows="4" placeholder="写下你想对崽崽说的话..."></textarea>
        <button id="sendPrivateLetterBtn" style="background: #b84c6c;">📨 发送私信</button>
        <div id="privateSendStatus" style="margin-top: 0.5rem; font-size: 0.8rem;"></div>
    </div>
</div>

<script>
    // ========== Firebase 配置 ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDW-Ix5Foerv-5A8M2-u1wabvb9Fai0wqU",
        authDomain: "xinxiang1-2e2a7.firebaseapp.com",
        databaseURL: "https://xinxiang1-2e2a7-default-rtdb.firebaseio.com",
        projectId: "xinxiang1-2e2a7",
        storageBucket: "xinxiang1-2e2a7.firebasestorage.app",
        messagingSenderId: "56801188595",
        appId: "1:56801188595:web:d8f83456808ef22b647586"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ========== 设备ID ==========
    let deviceId = localStorage.getItem('deviceId');
    if (!deviceId) {
        deviceId = 'device_' + Math.random().toString(36).substr(2, 16) + '_' + Date.now();
        localStorage.setItem('deviceId', deviceId);
    }

    let isAdmin = false;
    const ADMIN_PASSWORD = "zaizai2026";  // 修改为你想要的密码

    const statusDiv = document.getElementById('statusBar');
    const adminPanelDiv = document.getElementById('adminPanel');

    // ====== 核心改动：每次进入都弹出密码验证 ======
    function verifyAdmin() {
        const pwd = prompt("请输入管理员密码（每次进入都需要验证）：");
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            adminPanelDiv.style.display = 'block';
            adminPanelDiv.innerHTML = '<button id="adminModeBtn" class="admin-btn">🔓 管理员模式已开启（本次会话）</button>';
            statusDiv.innerHTML = '✅ 管理员验证通过，可以删除信件和评论，并可查看私信';
            statusDiv.style.backgroundColor = '#e6f7e6';
            document.getElementById('privateLettersContainer').style.display = 'block';
            // 重新渲染私信列表（因为之前可能已加载但未显示）
            // 但我们已经用 isAdmin 控制了显示，刷新会重新加载
        } else {
            // 密码错误或取消
            isAdmin = false;
            adminPanelDiv.style.display = 'none';
            statusDiv.innerHTML = '✅ 普通匿名模式（输入密码可成为管理员）';
            statusDiv.style.backgroundColor = '#e6f7e6';
            document.getElementById('privateLettersContainer').style.display = 'none';
            // 如果用户想重试，可以提供一个重新验证的按钮？
            // 我们可以添加一个“重新验证”按钮到 adminPanel，但为了简洁，这里用 alert 提示
            alert('密码错误，将以普通用户身份访问。如需重试，请刷新页面。');
        }
    }

    // 页面加载时执行验证
    verifyAdmin();

    // 可选：提供“重新验证”按钮，点击后重新弹窗
    // 我们可以将 adminPanel 设置为一个可点击重新验证的按钮，但这里已不再需要“成为管理员”按钮

    // ====== 以下功能保持不变（公开信件、评论、私信发送和查看） ======
    // 发布公开信件
    document.getElementById('postLetterBtn').addEventListener('click', async () => {
        const content = document.getElementById('newLetter').value.trim();
        if (!content) return alert("请填写内容");
        const newLetterRef = database.ref('letters').push();
        await newLetterRef.set({
            content: content,
            userId: deviceId,
            timestamp: Date.now()
        });
        document.getElementById('newLetter').value = '';
    });

    // 添加评论
    async function addComment(letterId, commentText) {
        if (!commentText.trim()) return;
        const commentRef = database.ref(`letters/${letterId}/comments`).push();
        await commentRef.set({
            content: commentText,
            userId: deviceId,
            timestamp: Date.now()
        });
    }

    // 删除公开信件（仅管理员）
    async function deleteLetter(letterId) {
        if (!isAdmin) {
            alert("只有管理员可以删除信件");
            return;
        }
        if (confirm("确定删除这封信件吗？")) {
            await database.ref(`letters/${letterId}`).remove();
        }
    }

    // 删除评论（仅管理员）
    async function deleteComment(letterId, commentId) {
        if (!isAdmin) {
            alert("只有管理员可以删除评论");
            return;
        }
        if (confirm("确定删除这条评论吗？")) {
            await database.ref(`letters/${letterId}/comments/${commentId}`).remove();
        }
    }

    // 私信相关（与之前相同）
    document.getElementById('openPrivateLetterBtn').addEventListener('click', () => {
        document.getElementById('privateLetterModal').classList.add('active');
        document.getElementById('privateLetterContent').value = '';
        document.getElementById('privateSendStatus').innerHTML = '';
    });
    document.getElementById('closePrivateModal').addEventListener('click', () => {
        document.getElementById('privateLetterModal').classList.remove('active');
    });
    document.getElementById('privateLetterModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
            document.getElementById('privateLetterModal').classList.remove('active');
        }
    });

    document.getElementById('sendPrivateLetterBtn').addEventListener('click', async () => {
        const content = document.getElementById('privateLetterContent').value.trim();
        if (!content) {
            document.getElementById('privateSendStatus').innerHTML = '❌ 请填写内容';
            document.getElementById('privateSendStatus').style.color = 'red';
            return;
        }
        const statusEl = document.getElementById('privateSendStatus');
        statusEl.innerHTML = '⏳ 发送中...';
        statusEl.style.color = '#9e7a8a';
        try {
            const newPrivateRef = database.ref('privateLetters').push();
            await newPrivateRef.set({
                content: content,
                userId: deviceId,
                timestamp: Date.now()
            });
            statusEl.innerHTML = '✅ 已发送！崽崽会看到的。';
            statusEl.style.color = 'green';
            document.getElementById('privateLetterContent').value = '';
        } catch (err) {
            statusEl.innerHTML = '❌ 发送失败，请重试';
            statusEl.style.color = 'red';
            console.error(err);
        }
    });

    // 管理员读取私信列表（实时）
    const privateLettersRef = database.ref('privateLetters');
    privateLettersRef.on('value', (snapshot) => {
        const privateLetters = snapshot.val();
        const container = document.getElementById('privateLettersContainer');
        if (!isAdmin) {
            container.style.display = 'none';
            return;
        }
        container.style.display = 'block';
        if (!privateLetters) {
            container.innerHTML = `
                <div class="card">
                    <div class="section-title" style="font-size:1.2rem; border-bottom-color: #d96c8c;">📨 私信（仅管理员可见）</div>
                    <p style="text-align:center; color:#b28aa0; padding:1rem;">暂无私信</p>
                </div>
            `;
            return;
        }
        const lettersArray = Object.entries(privateLetters).map(([id, data]) => ({ id, ...data }));
        lettersArray.sort((a,b) => b.timestamp - a.timestamp);
        let html = `
            <div class="card">
                <div class="section-title" style="font-size:1.2rem; border-bottom-color: #d96c8c;">📨 私信（仅管理员可见）</div>
        `;
        lettersArray.forEach(letter => {
            const date = new Date(letter.timestamp).toLocaleString();
            html += `
                <div class="private-letter-item">
                    <div class="private-letter-meta">匿名 · ${date}</div>
                    <div class="private-letter-content">${escapeHtml(letter.content)}</div>
                    <button class="delete-private-btn" data-id="${letter.id}" style="background:#fee2e2; color:#e5484d; border:none; border-radius:1rem; padding:0.1rem 0.6rem; font-size:0.7rem; cursor:pointer; margin-top:0.3rem;">🗑️ 删除</button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;

        document.querySelectorAll('.delete-private-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const id = btn.getAttribute('data-id');
                if (!isAdmin) return alert("无权限");
                if (confirm("确定删除这条私信吗？")) {
                    await database.ref(`privateLetters/${id}`).remove();
                }
            });
        });
    });

    // 公开信件渲染
    const lettersRef = database.ref('letters');
    lettersRef.on('value', (snapshot) => {
        const letters = snapshot.val();
        const container = document.getElementById('lettersContainer');
        if (!letters) {
            container.innerHTML = '<div class="card" style="text-align:center;">✨ 还没有信件，来当第一个树洞吧 ✨</div>';
            return;
        }
        const lettersArray = Object.entries(letters).map(([id, data]) => ({ id, ...data }));
        lettersArray.sort((a,b) => b.timestamp - a.timestamp);
        let html = '';
        for (let letter of lettersArray) {
            const date = new Date(letter.timestamp).toLocaleString();
            const comments = letter.comments ? Object.entries(letter.comments).map(([cid, cmt]) => ({ id: cid, ...cmt })).sort((a,b)=>a.timestamp - b.timestamp) : [];
            let commentsHtml = '';
            comments.forEach(cmt => {
                const cmtDate = new Date(cmt.timestamp).toLocaleString();
                const showCommentDelete = isAdmin ? `<button class="delete-comment-btn" data-letterid="${letter.id}" data-commentid="${cmt.id}" style="background:#fee2e2; color:#e5484d; border:none; border-radius:1rem; padding:0.1rem 0.4rem; font-size:0.6rem; margin-left:0.5rem; cursor:pointer;">删</button>` : '';
                commentsHtml += `
                    <div class="comment">
                        <div class="comment-meta">匿名 · ${cmtDate}${showCommentDelete}</div>
                        <div>${escapeHtml(cmt.content)}</div>
                    </div>
                `;
            });
            const showDelete = isAdmin ? `<button class="delete-letter-btn" data-id="${letter.id}" style="background:#fee2e2; color:#e5484d; border:none; border-radius:1rem; padding:0.2rem 0.6rem; cursor:pointer; font-size:0.7rem;">🗑️ 删除</button>` : '';
            html += `
                <div class="letter" data-id="${letter.id}">
                    <div class="letter-header">
                        <span>📝 匿名 · ${date}</span>
                        ${showDelete}
                    </div>
                    <div class="letter-content">${escapeHtml(letter.content)}</div>
                    <div class="comments-section">
                        ${commentsHtml}
                        <div class="add-comment">
                            <input type="text" placeholder="写一条评论..." id="commentInput_${letter.id}">
                            <button class="comment-submit" data-id="${letter.id}">💬 评论</button>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        document.querySelectorAll('.delete-letter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letterId = btn.getAttribute('data-id');
                deleteLetter(letterId);
            });
        });
        document.querySelectorAll('.delete-comment-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letterId = btn.getAttribute('data-letterid');
                const commentId = btn.getAttribute('data-commentid');
                deleteComment(letterId, commentId);
            });
        });
        document.querySelectorAll('.comment-submit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const letterId = btn.getAttribute('data-id');
                const input = document.getElementById(`commentInput_${letterId}`);
                const text = input.value.trim();
                if (text) {
                    addComment(letterId, text);
                    input.value = '';
                } else alert("评论不能为空");
            });
        });
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
</script>
</body>
</html>
