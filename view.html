<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崽崽的完整曲库｜歌单展示</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:linear-gradient(145deg,#fef5f7,#ffeef4);padding:2rem 1rem;color:#2c1e2a;}
        .container{max-width:1200px;margin:0 auto;}
        .header{text-align:center;margin-bottom:2rem;}
        h1{font-size:2.5rem;background:linear-gradient(135deg,#d96c8c,#b84c6c);background-clip:text;-webkit-background-clip:text;color:transparent;}
        .sub{color:#9e7a8a;margin-top:0.5rem;}
        .songs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.8rem;}
        .song-card{background:rgba(255,255,255,0.9);border-radius:1.8rem;padding:1.5rem;box-shadow:0 15px 30px -10px rgba(0,0,0,0.1);border:1px solid #ffecf2;}
        .song-name{font-size:1.3rem;font-weight:700;color:#4e2e3e;margin-bottom:0.5rem;}
        .song-remark{font-size:0.9rem;color:#9c7b8b;}
        .back-link{display:block;text-align:center;margin-top:2rem;color:#c27d9b;text-decoration:none;}
        footer{text-align:center;margin-top:2rem;color:#b28aa0;font-size:0.8rem;}
        .error-msg{text-align:center;padding:2rem;color:#c27d9b;}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🎶 崽崽的完整曲库</h1><div class="sub">以下都是崽崽会唱的歌～ 持续更新中 ✨</div></div>
    <div id="songsGrid" class="songs-grid"></div>
    <a href="index.html" class="back-link">← 返回崽崽的主页</a>
    <footer>© 2026 崽崽 · 歌单展示版（云端实时同步）</footer>
</div>
<script>
    const BIN_ID = "6a2cf550f5f4af5e29ea8566";
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;  // 注意：公开读取不需要 API Key，但你的 Bin 如果是私有的，则需要加 Key。这里先用无 Key 的 public 方式，如果你的 Bin 是私有的请改回带 Key 的版本。

    async function loadAndRender() {
        try {
            // 如果你的 Bin 是私有的，请使用带 Key 的 headers
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            let playlist = data.record || [];
            const container = document.getElementById('songsGrid');
            if (!playlist.length) {
                container.innerHTML = '<div class="error-msg">🎵 暂无歌曲，崽崽正在努力加载中～</div>';
                return;
            }
            let html = '';
            playlist.forEach(song => {
                html += `<div class="song-card"><div class="song-name">🎤 ${escapeHtml(song.name)}</div><div class="song-remark">${escapeHtml(song.remark) || '✨ 暂无备注'}</div></div>`;
            });
            container.innerHTML = html;
        } catch (err) {
            console.error(err);
            document.getElementById('songsGrid').innerHTML = '<div class="error-msg">⚠️ 加载失败，请稍后重试。如果持续出错，请联系崽崽。</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    loadAndRender();
    // 每30秒自动刷新一次，保持歌单最新
    setInterval(loadAndRender, 30000);
</script>
</body>
</html>
